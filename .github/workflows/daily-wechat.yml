name: Daily WeChat Message

on:
  workflow_dispatch:
  schedule:
   - cron: "5 10 * * *"

concurrency:
  group: daily-wechat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily message
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          WECHAT_TO_USER_OPENIDS: ${{ secrets.WECHAT_TO_USER_OPENIDS }}
          TZ: Asia/Shanghai
          ENABLE_WEATHER: "true"
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          WEATHER_LOCATION: 周口
          FIXED_TITLE: 宝宝要天天开心呀!
          FIXED_REMARK: 爱你!
          ANNIVERSARY_DATE: 2024-12-31
          ANNIVERSARY_NAME: 在一起
          FIELD_FIRST: first
          FIELD_DATE: date
          FIELD_WEEKDAY: weekday
          FIELD_WEATHER: weather
          FIELD_ANNIVERSARY: anniversary
          FIELD_REMARK: remark
          REQUEST_TIMEOUT_SECONDS: "30"
        run: python -m app.main
